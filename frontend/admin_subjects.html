<!DOCTYPE html>
<html>
<head>

<title>Manage Subjects</title>

<meta charset="UTF-8">

<link rel="stylesheet"
href="style.css?v=999">

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <h3>SMART TRACK SPM - Admin</h3>
    <button onclick="logout()">
        Logout
    </button>
</div>

<!-- PAGE -->
<div class="admin-page">

    <h1 class="page-title">
        📚 Subject Management
    </h1>

    <!-- ADD SUBJECT -->
    <div class="card admin-form">

        <input
            type="text"
            id="subject_name"
            placeholder="Enter Subject Name"
        >

        <button onclick="addSubject()">
            Add Subject
        </button>

    </div>

    <br><br>

    <!-- SUBJECT LIST -->
    <div
        id="subjectsContainer"
        class="admin-lis"
    >

        <div class="card">
            Loading subjects...
        </div>

    </div>

</div>

<script>

// LOAD SUBJECTS
function loadSubjects() {

    fetch(
    "http://localhost/sms/backend/subjects/get_subjects.php"
    )

    .then(res => res.json())

    .then(data => {

        const container =
            document.getElementById(
                "subjectsContainer"
            );

        container.innerHTML = "";

        // EMPTY
        if (data.length === 0) {

            container.innerHTML = `

                <div class="card">

                    <h2>No Subjects</h2>

                </div>

            `;

            return;
        }

        // LOOP
        data.forEach(subject => {
            
            container.innerHTML += `
            
            <div class="admin-list-item fade">
                
                <div class="admin-list-info">
                    
                    <h2>
                        ${subject.subject_name}
                    </h2>

                    <div class="subject-meta">
                        
                        <span class="meta-label">
                            Subject ID
                        </span>

                        <span class="meta-value">
                            #${subject.subject_id}
                        </span>

                    </div>

                </div>

                <div class="admin-actions">
                    
                    <button class="btn-edit"
                     onclick="editSubject(${subject.subject_id}, '${subject.subject_name}')">
                     ✏ Edit
                    </button>

                    <button class="btn-delete"
                     onclick="openDeleteModal(${subject.subject_id})">
                     🗑 Delete
                    </button>

                </div>

            </div>

            `;
        });

    });
}

function logout() {

    localStorage.clear();

    window.location.href =
        "login.html";
}

// ADD SUBJECT
function addSubject() {

    const subject_name =
        document.getElementById(
            "subject_name"
        ).value;

    fetch(
        "http://localhost/sms/backend/admin/add_subject.php",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({

                subject_name:
                    subject_name

            })
        }
    )

    .then(res => res.json())

    .then(data => {

        console.log(data);

        // SUCCESS
        if (data.status === "success") {

            alert("Subject added!");

            document.getElementById(
                "subject_name"
            ).value = "";

            loadSubjects();

        }

        // EMPTY
        else if (data.status === "empty") {

            alert("Please enter subject name");

        }

        else {

            alert("Failed");
        }

    });
}

let editSubjectId = null;

function editSubject(subject_id, subject_name) {

    editSubjectId = subject_id;

    document.getElementById("editSubjectName").value =
        subject_name;

    document.getElementById("editModal").style.display =
        "flex";
}

function closeEditModal() {

    editSubjectId = null;

    document.getElementById("editModal").style.display =
        "none";
}

function confirmEditSubject() {
    console.log("Save clicked");

    const newName =
        document.getElementById("editSubjectName").value.trim();

    if (!newName) {

        alert("Please enter a subject name.");

        return;
    }

    fetch(
        "http://localhost/sms/backend/admin/update_subject.php",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                subject_id: editSubjectId,
                subject_name: newName
            })
        }
    )

    .then(res => res.json())

    .then(data => {

        if (data.status === "success") {

            closeEditModal();

            loadSubjects();

        } else {

            alert("Failed to update subject.");
        }
    });
}

let selectedSubjectId = null;

function openDeleteModal(subject_id) {

    selectedSubjectId = subject_id;

    document.getElementById("deleteModal").style.display =
        "flex";
}

function closeDeleteModal() {

    selectedSubjectId = null;

    document.getElementById("deleteModal").style.display =
        "none";
}

function confirmDeleteSubject() {

    fetch(
        "http://localhost/sms/backend/admin/delete_subject.php",
        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                subject_id: selectedSubjectId
            })
        }
    )

    .then(res => res.json())

    .then(data => {

        if (data.status === "success") {

            closeDeleteModal();

            loadSubjects();

        } else {

            alert("Failed to delete subject");
        }
    });
}

// INITIAL LOAD
loadSubjects();

</script>

<div id="deleteModal" class="modal-overlay">

    <div class="modal-box">

        <div class="modal-icon">⚠️</div>

        <h2>Confirm Delete</h2>

        <p id="deleteMessage">
            Are you sure you want to delete this subject?
        </p>

        <div class="modal-actions">

            <button class="btn-secondary" onclick="closeDeleteModal()">
                Cancel
            </button>

            <button class="btn-danger" onclick="confirmDeleteSubject()">
                Delete
            </button>

        </div>

    </div>

</div>

<div id="editModal" class="modal-overlay">

    <div class="modal-box">

        <div class="modal-icon">
            ✏️
        </div>

        <h2>Edit Subject</h2>

        <p>
            Update the subject name below.
        </p>

        <br>

        <input
            type="text"
            id="editSubjectName"
            placeholder="Enter subject name"
        >

        <div class="modal-actions">

            <button
                class="btn-secondary"
                onclick="closeEditModal()">

                Cancel

            </button>

            <button type="button" onclick="confirmEditSubject()">
                Save Changes
            </button>

        </div>

    </div>

</div>

</body>
</html>
