<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<!-- AOS -->
<link rel="stylesheet"
href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>

body {
    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;
}

.auth-box {

    width:100%;
    max-width:420px;

    padding:35px;

    text-align:center;
}

.logo {

    font-size:40px;
    margin-bottom:10px;
}

.subtitle {
    color:#6b7280;
    margin-bottom:30px;
}

.auth-footer {
    margin-top:20px;
    color:#6b7280;
}

.auth-footer a {
    color:#4f46e5;
    text-decoration:none;
}

</style>

</head>

<body>

<!-- REGISTER BOX -->
<div class="card auth-box fade"
     data-aos="zoom-in">

    <div class="logo">🎓</div>

    <h1>Create Account</h1>

    <p class="subtitle">
        Join SMART TRACK SPM today
    </p>

    <!-- NAME -->
    <input
        type="text"
        id="name"
        placeholder="Enter your name">

    <!-- EMAIL -->
    <input
        type="email"
        id="email"
        placeholder="Enter your email">

    <!-- PASSWORD -->
    <input
        type="password"
        id="password"
        placeholder="Create password">

    <!-- BUTTON -->
    <button onclick="register()" style="width:100%;">
        🚀 Register
    </button>

    <!-- FOOTER -->
    <div class="auth-footer">

        Already have an account?

        <a href="login.html">
            Login
        </a>

    </div>

</div>

<!-- AOS -->
<script
src="https://unpkg.com/aos@2.3.1/dist/aos.js">
</script>

<script>

AOS.init({
    duration:700
});

// REGISTER
function register() {

    const name =
        document.getElementById("name").value;

    const email =
        document.getElementById("email").value;

    const password =
        document.getElementById("password").value;

    // VALIDATION
    if (!name || !email || !password) {

        alert("Please fill all fields");

        return;
    }

    const formData = new FormData();

    formData.append("name", name);

    formData.append("email", email);

    formData.append("password", password);

    fetch(
        "/backend/auth/register.php",
        {
            method:"POST",
            body:formData
        }
    )

    .then(res => res.json())

    .then(data => {

        console.log(data);

        // SUCCESS
        if (
            data.status === "success"
            ||
            data.status === "registered"
        ) {

            alert(
                data.message ||
                "Registration successful!"
            );

            setTimeout(() => {

                window.location.href =
                    "login.html";

            }, 500);
        }
        else {

            alert(
                data.message ||
                "Registration failed"
            );
        }
    })

    .catch(error => {

        console.error(error);

        alert("Server error");
    });
}

</script>

</body>
</html>
