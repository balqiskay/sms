<!DOCTYPE html>
<html>
<head>
<title>Quiz</title>
<meta charset="UTF-8">

<link rel="stylesheet" href="style.css">

<!-- AOS -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <h3>SMART TRACK SPM</h3>
    <button onclick="logout()">
        Logout
    </button>
</div>

<!-- SIDEBAR -->
<div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="subjects.html">📚 Subjects</a>
    <a href="#" onclick="goTopicsSidebar()">📘 Topics</a>
    <a href="#" onclick="goQuizSidebar()" class="active">📝 Quiz</a>
</div>

<!-- MAIN -->
<div class="main">

<h1 data-aos="fade-right">📝 Quiz Challenge</h1>

<p data-aos="fade-right" data-aos-delay="100">
Answer all questions and test your understanding.
</p>

<br>

<!-- QUIZ -->
<div id="quizContainer">

    <div class="card">
        Loading questions...
    </div>

</div>

<br>

<!-- SUBMIT -->
<button onclick="submitQuiz()">
    🚀 Submit Quiz
</button>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init({
    duration: 700
});

// GET TOPIC
const params = new URLSearchParams(window.location.search);

const topic_id = params.get("topic_id");

let answers = {};

// LOAD QUESTIONS
fetch(
`http://localhost/sms/backend/quiz/get_questions.php?topic_id=${topic_id}`
)

.then(res => res.json())

.then(data => {

    const container =
        document.getElementById("quizContainer");

    container.innerHTML = "";

    // NO QUESTIONS
    if (data.length === 0) {

        container.innerHTML = `
            <div class="card">
                <h2>No questions found</h2>
            </div>
        `;

        return;
    }

    // LOOP QUESTIONS
    data.forEach((q, index) => {

        container.innerHTML += `

        <div class="card fade"
             data-aos="fade-up"
             data-aos-delay="${index * 100}">

            <h2>
                Question ${index + 1}
            </h2>

            <p>
                <b>${q.question_text}</b>
            </p>

            <div class="option"
                 onclick="selectAnswer(${q.question_id}, 'A', this)">
                A) ${q.option_a}
            </div>

            <div class="option"
                 onclick="selectAnswer(${q.question_id}, 'B', this)">
                B) ${q.option_b}
            </div>

            <div class="option"
                 onclick="selectAnswer(${q.question_id}, 'C', this)">
                C) ${q.option_c}
            </div>

            <div class="option"
                 onclick="selectAnswer(${q.question_id}, 'D', this)">
                D) ${q.option_d}
            </div>

        </div>

        `;
    });

})

// ERROR
.catch(error => {

    console.error(error);

    document.getElementById("quizContainer")
    .innerHTML = `
        <div class="card">
            <h2>Error loading quiz</h2>
        </div>
    `;
});

function logout() {

    localStorage.clear();

    window.location.href =
        "login.html";
}

// SELECT ANSWER
function selectAnswer(qid, ans, element) {

    // SAVE
    answers[qid] = ans;

    // REMOVE OLD
    const options =
        element.parentElement.querySelectorAll(".option");

    options.forEach(opt =>
        opt.classList.remove("selected")
    );

    // ADD NEW
    element.classList.add("selected");
}

// SUBMIT QUIZ
function submitQuiz() {

    const user_id =
        localStorage.getItem("user_id");

    // CHECK LOGIN
    if (!user_id) {

        alert("User not logged in");

        return;
    }

    // CHECK ANSWERS
    if (Object.keys(answers).length === 0) {

        alert("Please answer at least one question");

        return;
    }

    fetch(
        "http://localhost/sms/backend/quiz/submit_quiz.php",
        {
            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                user_id:user_id,

                topic_id:topic_id,

                answers:answers
            })
        }
    )

    .then(res => res.json())

    .then(data => {

        // ERROR
        if (data.error) {

            alert(data.error);

            return;
        }

        // CHECK COMPLETION
        fetch(
            "http://localhost/sms/backend/progress/check_completion.php",
        {
            method:"POST",
            
            headers:{
                "Content-Type":"application/json"
            },
            
            body:JSON.stringify({
                user_id:user_id,
                topic_id:topic_id
            })
        })

        .then(res => res.text())

        .then(data => {
            console.log(data);

        });

        // GO RESULT
        window.location.href =

        `result.html?score=${data.score}
        &total=${data.total}
        &topic_id=${topic_id}`;
    })

    .catch(error => {

        console.error(error);

        alert("Server error");
    });
}

// SIDEBAR TOPICS
function goTopicsSidebar() {

    const subject_id =
        localStorage.getItem("subject_id");

    if (!subject_id) {

        alert("Please select a subject first");

        return;
    }

    window.location.href =
        "topics.html?subject_id=" + subject_id;
}

function goQuizSidebar() {

    const topic_id =
        localStorage.getItem(
            "topic_id"
        );

    // NO TOPIC
    if (!topic_id) {

        alert(
            "Please open a topic first"
        );

        return;
    }

    window.location.href =
        "quiz.html?topic_id=" + topic_id;
}

</script>

</body>
</html>
